name: Desktop Release

# Reproducible Apple Silicon unsigned-beta build per docs/requirements/molibot-macos-app-plan.md §16.1 / Phase 5.
# Produces the Molibot DMG, its SHA-256 checksum, and a build-info manifest.
# The DMG is unsigned (no Developer ID / notarization) — Gatekeeper install is the user's responsibility.

on:
  push:
    tags:
      - "molibot-v*"
  workflow_dispatch:
    # Build-only smoke (no release). Use to verify the DMG pipeline on a real macOS runner without publishing.

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  build:
    name: Build unsigned DMG (Apple Silicon)
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: desktop-cargo-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            desktop-cargo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare runtime + build Tauri DMG + checksum
        run: pnpm run desktop:build

      - name: Locate release artifacts
        id: artifacts
        run: |
          bundle_dir="apps/desktop/src-tauri/target/release/bundle/dmg"
          dmg_path="$(find "$bundle_dir" -type f -name '*.dmg' | head -n 1)"
          if [[ -z "$dmg_path" ]]; then
            echo "::error::No DMG produced under $bundle_dir"
            exit 1
          fi
          sha_path="${dmg_path}.sha256"
          if [[ ! -f "$sha_path" ]]; then
            echo "::error::Checksum sidecar missing: $sha_path"
            exit 1
          fi
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "sha_path=$sha_path" >> "$GITHUB_OUTPUT"
          echo "bundle_dir=$bundle_dir" >> "$GITHUB_OUTPUT"
          ls -la "$bundle_dir"

      - name: Write build-info manifest
        id: manifest
        run: |
          out="$(mktemp -d)/BUILD-INFO.txt"
          {
            echo "Molibot Desktop — Unsigned Beta Build"
            echo "======================================"
            echo "version: $(node -p "require('./apps/desktop/package.json').version")"
            echo "git_commit: $(git rev-parse HEAD)"
            echo "git_ref: $(git describe --tags --always 2>/dev/null || echo unknown)"
            echo "built_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner_os: ${{ runner.os }}"
            echo "runner_arch: ${{ runner.arch }}"
            echo "node: $(node --version)"
            echo "rustc: $(rustc --version)"
            echo "cargo: $(cargo --version)"
            echo "macos_deployment_target: ${MACOSX_DEPLOYMENT_TARGET}"
            echo "bundled_node_sidecar: 22.23.1 (darwin-arm64)"
            echo ""
            echo "Intended platform: Apple Silicon, macOS 13+"
            echo "Signature: unsigned (no Developer ID, no notarization)"
            echo "Install: drag Molibot.app to Applications; Gatekeeper may require an explicit override."
          } > "$out"
          cat "$out"
          echo "manifest_path=$out" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: molibot-desktop-dmg
          if-no-files-found: error
          path: |
            ${{ steps.artifacts.outputs.dmg_path }}
            ${{ steps.artifacts.outputs.sha_path }}
            ${{ steps.manifest.outputs.manifest_path }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/molibot-v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifacts.outputs.dmg_path }}
            ${{ steps.artifacts.outputs.sha_path }}
            ${{ steps.manifest.outputs.manifest_path }}
